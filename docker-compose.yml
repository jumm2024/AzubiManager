version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: azubimanager-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=AzubiManager2024!
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

  api:
    build: ./AzubiManager.Api
    container_name: azubimanager-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=AzubiManagerDb;User Id=sa;Password=AzubiManager2024!;TrustServerCertificate=True;
      - Jwt__Key=AzubiManagerSuperGeheimerSchluesselMindestens32ZeichenLangFuerJwtHmacSha256
      - Jwt__Issuer=AzubiManager
      - Jwt__Audience=AzubiManagerUsers
    ports:
      - "5112:8080"
    depends_on:
      - db
    volumes:
      - ./admin-password:/app/admin-password

volumes:
  sqldata: